{{ define "main" }}
<style>
  .posts-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 1.5rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem;
  }

  .post-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid #f0f0f0;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
  }

  .post-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(249,115,22,0.15);
    border-color: #f97316;
  }

  .post-card-body {
    padding: 1.2rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .post-card-title {
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.3;
    text-decoration: none !important;
  }

  .post-card-title:hover {
    color: #f97316 !important;
  }

  .post-card-desc {
    font-size: 0.85rem;
    color: #666;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-card-date {
    font-size: 0.75rem;
    color: #aaa;
    margin-top: 0.5rem;
  }

  .post-card-tag {
    display: inline-block;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: #fff !important;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    width: fit-content;
  }
</style>

<div class="posts-grid">
  {{ range .Pages }}
  <div class="post-card">
    {{ if .Params.coverImage }}
    <img src="{{ .Params.coverImage }}" alt="{{ .Title }}"
      style="width:100%;height:160px;object-fit:cover;" loading="lazy" />
    {{ end }}
    <div class="post-card-body">
      {{ if .Params.store }}
      <span class="post-card-tag">{{ .Params.store }}</span>
      {{ end }}
      <a class="post-card-title" href="{{ .Permalink }}">{{ .Title }}</a>
      {{ if .Description }}
      <p class="post-card-desc">{{ .Description }}</p>
      {{ end }}
      <span class="post-card-date">{{ .Date.Format "02/01/2006" }}</span>
    </div>
  </div>
  {{ end }}
</div>
{{ end }}
